<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>재고관리 앱</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Inventory Manager</p>
      <h1>재고관리</h1>
    </div>
    <button id="installBtn" class="ghost hidden">앱 설치</button>
  </header>

  <main>
    <section class="summary-grid">
      <div class="card stat"><span>전체 품목</span><strong id="totalItems">0</strong></div>
      <div class="card stat"><span>총 재고</span><strong id="totalStock">0</strong></div>
      <div class="card stat"><span>부족 품목</span><strong id="lowItems">0</strong></div>
    </section>

    <nav class="tabs" aria-label="화면 이동">
      <button class="tab active" data-tab="dashboard">대시보드</button>
      <button class="tab" data-tab="movement">입출고</button>
      <button class="tab" data-tab="items">품목관리</button>
      <button class="tab" data-tab="history">내역</button>
    </nav>

    <section id="dashboard" class="panel active">
      <div class="section-title">
        <h2>품목별 현재 재고</h2>
        <button class="small" id="exportBtn">CSV 내보내기</button>
      </div>
      <div id="stockList" class="list"></div>
    </section>

    <section id="movement" class="panel">
      <div class="card">
        <h2>입출고 입력</h2>
        <label>품목
          <select id="movementItem"></select>
        </label>
        <div class="segmented">
          <button type="button" id="inBtn" class="selected">입고</button>
          <button type="button" id="outBtn">출고</button>
        </div>
        <label>수량
          <input id="qtyInput" type="number" min="1" inputmode="numeric" placeholder="예: 10" />
        </label>
        <label>메모
          <input id="memoInput" type="text" placeholder="예: 거래처, 사유 등" />
        </label>
        <button id="saveMovement" class="primary">저장</button>
      </div>
    </section>

    <section id="items" class="panel">
      <div class="card">
        <h2>품목 추가</h2>
        <label>품목명
          <input id="newItemName" type="text" placeholder="예: 생수 500ml" />
        </label>
        <label>초기 재고
          <input id="newItemStock" type="number" min="0" inputmode="numeric" placeholder="0" />
        </label>
        <label>부족 기준 수량
          <input id="newItemLow" type="number" min="0" inputmode="numeric" placeholder="예: 5" />
        </label>
        <button id="addItem" class="primary">품목 추가</button>
      </div>
      <div class="section-title"><h2>품목 수정</h2></div>
      <div id="itemManageList" class="list"></div>
    </section>

    <section id="history" class="panel">
      <div class="section-title">
        <h2>최근 입출고 내역</h2>
        <button class="small danger" id="clearHistory">내역 삭제</button>
      </div>
      <div id="historyList" class="list"></div>
    </section>
  </main>

  <div id="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
