<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>재고관리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Inventory Manager</p>
      <h1>재고관리</h1>
    </div>
    <button id="installBtn" class="ghost hidden">앱 설치</button>
  </header>

  <nav class="tabs" aria-label="주요 메뉴">
    <button class="tab active" data-view="dashboard">대시보드</button>
    <button class="tab" data-view="movement">입출고</button>
    <button class="tab" data-view="categories">품목관리</button>
    <button class="tab" data-view="history">내역</button>
  </nav>

  <main>
    <section id="dashboard" class="view active">
      <div class="summary-grid">
        <article class="summary-card"><span>전체 품목</span><strong id="totalItems">0</strong></article>
        <article class="summary-card"><span>총 재고</span><strong id="totalStock">0</strong></article>
        <article class="summary-card warning"><span>부족 품목</span><strong id="lowCount">0</strong><small>30 미만</small></article>
      </div>

      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="AF 1.5, CR 등 검색" />
        <select id="majorFilter"><option value="">전체 대분류</option></select>
      </div>

      <section class="panel">
        <div class="panel-title">
          <h2>품목별 재고 현황</h2>
          <span class="badge">30 미만 자동 표시</span>
        </div>
        <div id="stockList" class="stock-list"></div>
      </section>

      <section class="panel low-panel">
        <div class="panel-title">
          <h2>부족 재고</h2>
          <span class="badge danger">주의</span>
        </div>
        <div id="lowStockList" class="mini-list"></div>
      </section>
    </section>

    <section id="movement" class="view">
      <section class="panel">
        <h2>간편 입출고</h2>
        <form id="movementForm" class="form-stack">
          <label>대분류
            <select id="moveMajor" required></select>
          </label>
          <label>소분류
            <select id="moveMinor" required></select>
          </label>
          <div class="segmented">
            <label><input type="radio" name="type" value="in" checked /> 입고</label>
            <label><input type="radio" name="type" value="out" /> 출고</label>
          </div>
          <label>수량
            <input id="moveQty" type="number" inputmode="numeric" min="1" placeholder="수량 입력" required />
          </label>
          <label>메모
            <input id="moveMemo" type="text" placeholder="선택 입력" />
          </label>
          <button class="primary" type="submit">저장하기</button>
        </form>
      </section>
    </section>

    <section id="categories" class="view">
      <section class="panel">
        <h2>대분류 관리</h2>
        <form id="majorForm" class="inline-form">
          <input id="majorName" type="text" placeholder="예: AF" />
          <button class="primary" type="submit">추가</button>
        </form>
        <div id="majorChips" class="chip-list"></div>
      </section>

      <section class="panel">
        <h2>소분류 관리</h2>
        <form id="minorForm" class="inline-form">
          <input id="minorName" type="text" placeholder="예: 1.5" />
          <button class="primary" type="submit">추가</button>
        </form>
        <div id="minorChips" class="chip-list"></div>
      </section>
      <p class="notice">대분류/소분류 삭제 시 해당 조합의 재고와 입출고 내역도 함께 정리됩니다.</p>
    </section>

    <section id="history" class="view">
      <section class="panel">
        <div class="panel-title">
          <h2>입출고 내역</h2>
          <button id="clearHistory" class="ghost danger-text">내역 삭제</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
